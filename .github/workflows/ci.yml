name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  fast:
    name: Fast build and unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            demo/go.sum

      - name: Build root module
        run: go build ./...

      - name: Test root module
        run: go test ./...

      - name: Build demo module
        working-directory: demo
        run: go build ./...

      - name: Test demo module
        working-directory: demo
        run: go test ./...

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            demo/go.sum

      - name: Run integration tests
        run: go test -tags=integration ./...
